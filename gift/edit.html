<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowers</title>

  <link rel="stylesheet" href="style.css">

  <script type="module" src="/gift/scripts/modes/EditMode.js" defer></script>
</head>

<body>
  <div id="gift">
    <textarea id="message" class="message" maxlength="200" placeholder="Your message here…"></textarea>

    <div id="bouquet" class="editable">
      <canvas id="bouquetCanvas" width="360" height="360"></canvas>
    </div>
  </div>

  <div id="counter"></div>
  <div id="palette"></div>

  <div class="controls">
    <button id="delete" class="delete">Delete Selected</button>
    <button id="preview">Preview</button>
  </div>
</body>
</html>
